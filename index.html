</script>
<title>Aiplus Kids — образовательная платформа для 5-6 классов</title>
<meta name="description" content="Профориентация, диагностика знаний, видеоуроки и ИИ-консультант для детей 10-12 лет.">
<meta property="og:title" content="Aiplus Kids — образовательная платформа">
<meta property="og:description" content="Профориентация, диагностика знаний, видеоуроки для 5-6 классов">
<meta property="og:url" content="https://flameelement01.github.io/aiplus-mbti-kids/">
<meta property="og:type" content="website">
<meta property="og:locale" content="ru_RU">
<meta name="theme-color" content="#193b53">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<style>
:root{
  --bg:linear-gradient(135deg,#e8f0fe 0%,#f5f0e8 100%);--bg-flat:#f0f4f8;--dark:#1472c2;--card:#ffffff;--accent:#faa318;--accent2:#f1ac3f;
  --muted:#666;--border:rgba(0,0,0,.08);--radius:18px;
  --shadow:0 4px 24px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);--dark-bg:#193b53;
  --green:#2d7d46;--red:#c03000;
}
*{box-sizing:border-box;margin:0;padding:0}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}
}


/* ===== OLYMP LANDING MODE ===== */
body.olymp-landing .bottomnav{display:none!important}
body.olymp-landing{padding-bottom:0!important}
body.olymp-landing #main-header{display:none!important}

html{scroll-behavior:smooth}
body{background:var(--bg-flat);background:var(--bg);color:var(--dark);font-family:'Source Sans 3','Nunito',sans-serif;font-size:15px;
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;
  padding-bottom:70px}

/* TOPBAR */
.topbar{background:var(--dark-bg);color:#fff;padding:10px 20px;display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:8px}
.logo img{height:36px;transform:rotate(270deg)}
.logo-text{font-size:17px;font-weight:900;color:#fff}
.logo-text span{color:var(--accent)}
.badge{background:var(--accent);color:#000;font-size:11px;font-weight:700;
  padding:4px 11px;border-radius:20px;letter-spacing:.4px}

/* BOTTOM NAV */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--dark-bg);display:flex;justify-content:space-around;
  padding:6px 0 env(safe-area-inset-bottom,6px);border-top:1px solid rgba(255,255,255,.08)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 8px;cursor:pointer;color:rgba(255,255,255,.45);
  font-size:11px;font-weight:700;transition:.2s;min-width:64px;min-height:44px;text-decoration:none;
  -webkit-tap-highlight-color:transparent}
.nav-item.active{color:var(--accent)}
.nav-item .nav-ic{font-size:20px;line-height:1}

/* WRAP */
.wrap{max-width:780px;margin:0 auto;padding:16px 14px 20px}

/* COMMON */
.card{background:var(--card);border-radius:var(--radius);padding:28px 22px;
  border:1px solid var(--border);box-shadow:var(--shadow)}
.btn{background:var(--dark);color:#fff;border:none;padding:16px 36px;
  border-radius:50px;font-family:'Source Sans 3',sans-serif;font-size:14px;font-weight:800;
  cursor:pointer;transition:transform .2s,box-shadow .2s;display:inline-block;text-align:center}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(20,114,194,.3)}
.btn-outline{background:transparent;border:2px solid var(--dark);color:var(--dark);
  padding:13px 28px;border-radius:50px;font-family:'Source Sans 3',sans-serif;font-size:13px;
  font-weight:700;cursor:pointer;transition:all .2s}
.btn-outline:hover{background:var(--dark);color:#fff}
.btn-accent{background:var(--accent);color:#000;border:none;padding:15px 32px;
  border-radius:50px;font-family:'Source Sans 3',sans-serif;font-size:14px;font-weight:800;
  cursor:pointer;transition:transform .2s}
.btn-accent:hover{transform:translateY(-2px)}
.btn-sm{border:none;padding:8px 14px;border-radius:20px;font-size:11px;
  font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif;white-space:nowrap}
.hidden{display:none!important}
button:focus-visible,a:focus-visible,[tabindex]:focus-visible,.opt:focus-visible,.nav-item:focus-visible,.home-card:focus-visible{
  outline:2px solid var(--dark);outline-offset:2px;border-radius:4px}

.section-title{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;
  letter-spacing:-.5px;margin-bottom:6px}
.section-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6}

/* PROGRESS */
.prog{height:4px;background:rgba(0,0,0,.07);border-radius:4px;margin:16px 0 4px}
.prog-bar{height:4px;background:var(--accent);border-radius:4px;transition:width .4s ease}
.prog-info{font-size:11px;color:var(--muted);font-weight:600;display:flex;
  justify-content:space-between;margin-bottom:14px}

/* OPTIONS */
.opt{background:#f0ede5;border:2px solid transparent;border-radius:13px;
  padding:16px 20px;text-align:left;cursor:pointer;font-family:'Source Sans 3',sans-serif;
  font-size:14px;font-weight:600;color:var(--dark);transition:all .18s;
  display:flex;align-items:center;gap:11px}
.opt:hover{border-color:var(--dark);background:#fff;transform:translateX(4px)}
.opt:active{background:var(--dark);color:#fff}
.opt:active .opt-let{background:#fff;color:var(--dark)}
.opt-let{display:flex;align-items:center;justify-content:center;background:var(--dark);
  color:#fff;border-radius:8px;width:28px;height:28px;font-size:11px;
  font-weight:900;flex-shrink:0}
.opts{display:flex;flex-direction:column;gap:9px}
.q-text{font-family:'Nunito',sans-serif;font-size:clamp(17px,3vw,22px);font-weight:800;
  line-height:1.35;margin-bottom:26px;letter-spacing:-.3px}

/* HOME GRID */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.home-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:22px 18px;cursor:pointer;transition:all .2s;text-align:left}
.home-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.home-card.full{grid-column:1/-1}
.home-card .hc-ic{font-size:28px;margin-bottom:10px}
.home-card h3{font-size:15px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px}
.home-card p{font-size:11px;color:var(--muted);line-height:1.5}
.home-card .hc-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:20px;margin-top:8px}

/* HERO (welcome) */
.hero{padding:36px 0 24px;text-align:center}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:var(--dark-bg);
  color:#fff;font-size:11px;font-weight:700;padding:6px 14px;
  border-radius:20px;letter-spacing:1px;text-transform:uppercase;margin-bottom:18px}
.hero-title{font-family:'Source Sans 3',sans-serif;font-size:clamp(22px,4.5vw,36px);
  font-weight:900;line-height:1.15;letter-spacing:-1px;margin-bottom:16px}
.hero-title .hl{color:#fff;background:var(--dark);padding:2px 14px;
  border-radius:10px;display:inline-block}
.hero-sub{font-size:14px;color:var(--muted);line-height:1.7;max-width:480px;margin:0 auto 24px}
.stats{display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:10px 16px;text-align:center;min-width:72px}
.stat b{font-size:20px;font-weight:900;display:block}
.stat small{font-size:11px;color:var(--muted);font-weight:600}

/* TRUST */
.trust{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-top:28px}
.trust-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:left}
.trust-card .ic{font-size:20px;margin-bottom:8px}
.trust-card h4{font-size:13px;font-weight:700;margin-bottom:3px}
.trust-card p{font-size:11px;color:var(--muted);line-height:1.6}

/* WHY */
.why{background:var(--dark-bg);color:#fff;border-radius:18px;padding:22px;margin:20px 0}
.why h3{font-size:15px;font-weight:800;margin-bottom:12px;color:var(--accent)}
.why-item{display:flex;align-items:flex-start;gap:9px;font-size:12px;line-height:1.6;color:#bbb;margin-bottom:7px}
.why-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;flex-shrink:0;margin-top:6px}

/* LANG */
.lang-wrap{text-align:center;padding:50px 0}
.lang-title{font-size:26px;font-weight:900;margin-bottom:28px}
.lang-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.lang-btn{background:var(--card);border:2px solid var(--border);border-radius:16px;
  padding:24px 36px;cursor:pointer;transition:all .2s;text-align:center;min-width:150px}
.lang-btn:hover{border-color:var(--dark);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.lang-btn .flag{font-size:32px;margin-bottom:6px}
.lang-btn .lbl{font-size:15px;font-weight:800}

/* REGISTER */
.inp{width:100%;padding:15px 18px;background:#f0ede5;border:2px solid transparent;
  border-radius:12px;font-family:'Source Sans 3',sans-serif;font-size:15px;color:var(--dark);
  margin-bottom:10px;transition:border .2s}
.inp:focus{outline:none;border-color:var(--dark);background:#fff}

/* LOADER */
.loader{text-align:center;padding:80px 20px}
.spinner{width:44px;height:44px;border:4px solid rgba(0,0,0,.1);border-top-color:var(--dark);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 22px}
@keyframes spin{to{transform:rotate(360deg)}}

/* RESULT */
.result{animation:fadeUp .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.share-bar{background:var(--dark-bg);border-radius:14px;padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.share-bar .lbl{color:#fff;font-size:12px;font-weight:600;flex:1;min-width:140px}
.share-bar .lbl span{color:var(--accent)}
.share-btns{display:flex;gap:7px;flex-wrap:wrap}
.btn-copy{background:var(--accent);color:#000}
.btn-wa{background:#25D366;color:#fff}
.btn-pdf{background:#E74C3C;color:#fff}

.slide{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);
  box-shadow:0 6px 32px rgba(0,0,0,.08);margin-bottom:16px}
.slide-hdr{padding:12px 22px;display:flex;justify-content:space-between;
  align-items:center;font-size:11px;font-weight:700;letter-spacing:1px;color:#fff}
.slide-body{display:flex;background:#fff;flex-wrap:wrap}
.slide-l{flex:0 0 240px;padding:24px 20px;background:#fafafa;border-right:1px solid var(--border)}
.slide-r{flex:1;min-width:240px;padding:24px 20px}
.type-big{font-size:44px;margin-bottom:4px}
.type-name{font-size:17px;font-weight:900;margin-bottom:4px}
.type-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:1px;margin-bottom:12px;border-bottom:1px solid var(--border);padding-bottom:12px}
.type-desc{font-size:12px;line-height:1.7;color:#555}
.pro-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1px;
  color:#fff;padding:6px 12px;border-radius:7px;display:inline-block;margin-bottom:8px}
.pro-list{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pro-item{font-size:11px;color:#555;font-weight:600;padding:5px 8px;background:#f5f2eb;border-radius:5px}
.bars{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.bars-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.bar-row{margin-bottom:6px}
.bar-label{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:3px}
.bar-track{height:6px;background:rgba(0,0,0,.06);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.sec{background:var(--card);border-radius:var(--radius);padding:22px;
  border:1px solid var(--border);margin-bottom:16px;box-shadow:var(--shadow)}
.sec-title{font-size:17px;font-weight:800;letter-spacing:-.3px;margin-bottom:3px}
.sec-sub{font-size:12px;color:var(--muted);margin-bottom:14px}
.cta{background:var(--accent);border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:16px}
.cta h2{font-size:20px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px}
.cta p{font-size:13px;color:#333;margin-bottom:16px;line-height:1.6}
.cta a{background:var(--dark-bg);color:#fff;text-decoration:none;padding:14px 28px;
  border-radius:50px;font-size:12px;font-weight:800;display:inline-block}
.disclaimer{font-size:11px;color:#888;padding:12px;background:#f0ede5;border-radius:9px;line-height:1.7;text-align:center}

/* COLORS */
.b-people{background:linear-gradient(90deg,#6366f1,#818cf8)}
.b-research{background:linear-gradient(90deg,#10b981,#34d399)}
.b-tech{background:linear-gradient(90deg,#3b82f6,#60a5fa)}
.b-creative{background:linear-gradient(90deg,#f43f5e,#fb7185)}
.b-nature{background:linear-gradient(90deg,#22c55e,#4ade80)}
.b-economy{background:linear-gradient(90deg,#f59e0b,#fbbf24)}

/* ===== DIAGNOSTIC ===== */
.diag-subject{background:var(--card);border:2px solid var(--border);border-radius:14px;
  padding:20px;cursor:pointer;transition:.2s;text-align:center}
.diag-subject:hover{border-color:var(--dark);transform:translateY(-2px)}
.diag-subject.active{border-color:var(--dark);background:#f0f6ff}
.diag-subject .ds-ic{font-size:32px;margin-bottom:8px}
.diag-subject h4{font-size:14px;font-weight:800}
.diag-subject p{font-size:11px;color:var(--muted)}
.diag-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.diag-opt{background:#f0ede5;border:2px solid transparent;border-radius:13px;padding:14px 18px;
  cursor:pointer;font-size:14px;font-weight:600;transition:.18s;display:flex;align-items:center;gap:10px}
.diag-opt:hover{border-color:var(--dark);background:#fff}
.diag-opt.correct{border-color:var(--green);background:#e6f4d7;color:var(--green)}
.diag-opt.wrong{border-color:var(--red);background:#ffe8e0;color:var(--red)}
.diag-result{text-align:center;padding:30px}
.diag-score{font-size:48px;font-weight:900;margin-bottom:8px}
.diag-grade{font-size:14px;color:var(--muted);margin-bottom:20px}

/* ===== COURSES ===== */
.course-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px;margin-bottom:12px;transition:.2s}
.course-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.course-card .cc-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.course-card .cc-ic{font-size:28px}
.course-card h4{font-size:14px;font-weight:800}
.course-card .cc-sub{font-size:11px;color:var(--muted)}
.course-card .cc-lessons{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.lesson-item{display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:#f8f9fb;border-radius:10px;font-size:12px;font-weight:600;
  cursor:pointer;transition:.2s}
.lesson-item:hover{background:#eef3ff}
.lesson-item .li-play{color:var(--dark);font-size:14px}

/* ===== AI CHAT ===== */
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 170px);
  max-height:600px;background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.chat-header{padding:16px 20px;background:var(--dark-bg);color:#fff;
  display:flex;align-items:center;gap:10px}
.chat-header .ch-dot{width:8px;height:8px;background:#4ade80;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chat-header h3{font-size:14px;font-weight:800}
.chat-header p{font-size:11px;color:rgba(255,255,255,.6)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:85%;padding:12px 16px;border-radius:14px;font-size:13px;line-height:1.6}
.chat-msg.bot{background:#f0f4f8;color:var(--dark);align-self:flex-start;border-bottom-left-radius:4px}
.chat-msg.user{background:var(--dark);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-input-wrap{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border)}
.chat-input{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:50px;
  font-family:'Source Sans 3',sans-serif;font-size:13px;color:var(--dark)}
.chat-input:focus{outline:none;border-color:var(--dark)}
.chat-send{background:var(--dark);color:#fff;border:none;border-radius:50%;
  width:42px;height:42px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.chat-faq{display:flex;flex-wrap:wrap;gap:6px;padding:0 16px 12px}
.faq-btn{background:#f0ede5;border:1px solid var(--border);border-radius:20px;
  padding:8px 14px;font-size:11px;font-weight:600;cursor:pointer;transition:.2s;
  font-family:'Source Sans 3',sans-serif;color:var(--dark)}
.faq-btn:hover{background:#fff;border-color:var(--dark)}

/* INFO ARTICLES */
.article-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:18px;margin-bottom:12px;cursor:pointer;transition:.2s}
.article-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.article-card .ac-tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;
  background:#e6f4d7;color:var(--green);margin-bottom:8px;display:inline-block}
.article-card h4{font-size:14px;font-weight:800;margin-bottom:4px}
.article-card p{font-size:12px;color:var(--muted);line-height:1.6}
.article-body{font-size:13px;line-height:1.8;color:#444}
.article-body h3{font-size:16px;font-weight:800;color:var(--dark);margin:18px 0 8px}
.article-body p{margin-bottom:12px}
.article-body ul{margin:0 0 12px 20px}
.article-body li{margin-bottom:6px}

/* REVIEWS */
.reviews{margin-top:24px}
.review-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;margin-bottom:10px}
.review-card .rv-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.review-card .rv-avatar{width:36px;height:36px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.review-card .rv-name{font-size:13px;font-weight:700}
.review-card .rv-role{font-size:11px;color:var(--muted)}
.review-card .rv-stars{color:#f59e0b;font-size:12px;letter-spacing:1px}
.review-card .rv-text{font-size:12px;color:#555;line-height:1.6;font-style:italic}

/* ABOUT */
.about-block{background:var(--dark-bg);color:#fff;border-radius:18px;padding:24px;margin:20px 0}
.about-block h3{font-size:16px;font-weight:800;margin-bottom:12px;color:var(--accent)}
.about-block p{font-size:12px;line-height:1.7;color:#ccc;margin-bottom:10px}
.about-stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px}
.about-stat{background:rgba(255,255,255,.08);border-radius:12px;padding:12px 16px;text-align:center;flex:1;min-width:70px}
.about-stat b{font-size:20px;font-weight:900;display:block;color:var(--accent)}
.about-stat small{font-size:11px;color:#aaa;font-weight:600}

/* CONTACTS */
.contacts{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:22px;margin-top:20px;text-align:center}
.contacts h3{font-size:15px;font-weight:800;margin-bottom:14px}
.social-links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.social-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;

function goTab(tab){
  S.tab=tab;
  if(tab==='test'&&!S.testDone) S.screen='welcome';
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    const tabs=['home','test','diag','courses','ai'];
    el.classList.toggle('active',tabs[i]===tab);
    el.lastChild.textContent=t(tabs[i]);
  });
  renderTab();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderTab(){
  const a=app();
  switch(S.tab){
    case'home':rHome(a);break;
    case'test':renderTest();break;
    case'diag':rDiag(a);break;
    case'courses':rCourses(a);break;
    case'ai':rAI(a);break;
    case'olymp':rOlymp(a);break;
  }
}

function confetti(){const c=document.createElement('div');c.className='confetti-container';document.body.appendChild(c);

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

// PDF report generation
function generateDiagPDF(){
  const qs=S.diagQuestions||[];const pct=qs.length>0?Math.round(S.diagScore/qs.length*100):0;
  const subj=S.diagSubject;const subName=subj?DIAG[subj][S.lang].name:'';
  const nm=S.diagName||'Ученик';const isKz=S.lang==='kz';
  const grade=S.diagGrade||'5';
  const dateStr=new Date().toLocaleDateString('ru-RU');
  const gaps=getGapAnalysis();
  const weak=gaps.filter(g=>g.pct<80);
  const strong=gaps.filter(g=>g.pct>=80);

  // Collect all completed subjects
  const gradeSubjects=Object.keys(DIAG).filter(k=>DIAG[k].grade===grade);
  let allSubj=[];
  gradeSubjects.forEach(sk=>{
    const p=S.diagProgress[sk];
    const sn=DIAG[sk][S.lang].name;
    if(p) allSubj.push({name:sn,key:sk,score:p.score,total:p.total,pct:p.pct});
  });
  // If only current subject done
  if(allSubj.length===0) allSubj=[{name:subName,key:subj,score:S.diagScore,total:qs.length,pct}];

  // Summary bars
  let sumBars='';

    sumBars+=`<div style="display:flex;align-items:center;margin-bottom:10px">
      <div style="flex:1;display:flex;align-items:baseline;gap:6px">
        <span style="font-size:15px;font-weight:700;color:#333">${s.name}</span>
        <span style="font-size:20px;font-weight:900;color:${col}">${s.pct}%</span>
        <span style="font-size:12px;color:#999">${s.score} / ${s.total}</span>
      </div>
      <div style="width:40%;height:8px;background:#E8E8E8;border-radius:8px;overflow:hidden">
        <div style="height:100%;width:${s.pct}%;background:${col};border-radius:8px"></div>
      </div>
    </div>`;
  });

  // Subject block details
  let subjSections='';
  allSubj.forEach(s=>{
    const blocks=DIAG_BLOCKS[s.key];
    if(!blocks) return;
    // Get block answers for this subject
    let blockAnswers={};
    const srcAnswers=(S.diagProgress[s.key]&&S.diagProgress[s.key].answers)?S.diagProgress[s.key].answers:(s.key===subj?S.diagAnswers:[]);
    srcAnswers.forEach(a=>{
      const b=a.block!=null?a.block:0;
      if(!blockAnswers[b])blockAnswers[b]={total:0,correct:0};
      blockAnswers[b].total++;
      if(a.correct)blockAnswers[b].correct++;
    });

    subjSections+=`<div style="margin-top:20px">
      <div style="background:#3D5A80;color:#fff;padding:10px 18px;border-radius:6px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:14px;font-weight:800;letter-spacing:0.5px">${s.name.toUpperCase()}</span>
        <span style="font-size:14px;font-weight:700">${s.score}/${s.total} (${s.pct}%)</span>
      </div>`;

    blocks.forEach((bl,i)=>{
      const loc=isKz?bl.kz:bl.ru;
      const stats=blockAnswers[i]||{total:0,correct:0};
      const bPct=stats.total>0?Math.round(stats.correct/stats.total*100):0;
      const barCol=bPct>=80?'#4CAF50':bPct>=50?'#F5A623':'#E74C3C';
      const badgeBg=bPct>=80?'#E8F5E9':'#FFF3E0';
      const badgeCol=bPct>=80?'#2E7D32':'#E65100';
      const badgeText=bPct>=80?(isKz?'Жақсы білу':'Хорошо'):(isKz?'Қажет білу':'Нужна работа');

      subjSections+=`<div style="padding:14px 18px;border-bottom:1px solid #EEEEEE">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:700;color:#333;margin-bottom:2px">${isKz?'Блок':'Блок'} ${bl.range} — ${loc.name}</div>
            <div style="font-size:11px;color:#999;margin-bottom:6px">${stats.correct}/${stats.total}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:13px;font-weight:800;color:#333;margin-bottom:4px">${stats.correct}/${stats.total}</div>
            <div style="background:${badgeBg};color:${badgeCol};font-size:11px;font-weight:700;padding:3px 12px;border-radius:12px;display:inline-block">${badgeText}</div>
          </div>
        </div>
        <div style="height:6px;background:#E8E8E8;border-radius:6px;overflow:hidden;margin:6px 0">

      </div>`;
    });
    subjSections+=`</div>`;
  });

  // Page 2: Recommendations
  let recsH=`<div style="margin-top:28px">
    <div style="background:#3D5A80;color:#fff;padding:10px 18px;border-radius:6px;font-size:14px;font-weight:800;letter-spacing:0.5px">${isKz?'ҰСЫНЫСТАР':'РЕКОМЕНДАЦИИ'}</div>

  // Collect all weak blocks across subjects
  let allWeak=[];let allStrong=[];
  allSubj.forEach(s=>{
    const blocks=DIAG_BLOCKS[s.key];
    if(!blocks) return;
    let blockAnswers={};
    const srcAnswers2=(S.diagProgress[s.key]&&S.diagProgress[s.key].answers)?S.diagProgress[s.key].answers:(s.key===subj?S.diagAnswers:[]);
    srcAnswers2.forEach(a=>{
      const b=a.block!=null?a.block:0;
      if(!blockAnswers[b])blockAnswers[b]={total:0,correct:0};
      blockAnswers[b].total++;
      if(a.correct)blockAnswers[b].correct++;
    });
    blocks.forEach((bl,i)=>{
      const stats=blockAnswers[i]||{total:0,correct:0};
      const bPct=stats.total>0?Math.round(stats.correct/stats.total*100):0;
      const loc=isKz?bl.kz:bl.ru;
      const entry={subName:s.name,block:bl,loc,pct:bPct,range:bl.range};
      if(bPct<80) allWeak.push(entry); else allStrong.push(entry);
    });
  });

  if(allWeak.length>0){
    recsH+=`<div style="font-size:15px;font-weight:800;color:#333;margin-bottom:12px">${isKz?'Фокус тақырыптар:':'Фокус темы:'}</div>`;
    allWeak.forEach(w=>{
      recsH+=`<div style="margin-bottom:14px">

  if(allStrong.length>0){

      recsH+=`<div style="font-size:13px;color:#2E7D32;margin-bottom:5px;line-height:1.5">— ${s.subName} ${isKz?'Блок':'Блок'} ${s.range} ${s.loc.name} — ${s.pct}%</div>`;
    });
  }
  recsH+=`</div></div>`;

  const cap=document.getElementById('pdf-capture');
  cap.style.cssText='position:absolute;left:-9999px;top:0;width:620px;background:#fff;padding:0;font-family:Source Sans 3,Nunito,sans-serif';
  cap.innerHTML=`
    <div style="background:linear-gradient(135deg,#2C3E6B,#3D6098);padding:22px 28px;color:#fff">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <div style="font-size:22px;font-weight:900;letter-spacing:0.5px"><span style="color:#F5A623">ai</span><span style="color:#fff">plus</span></div>
      </div>
      <div style="font-size:18px;font-weight:800">${isKz?'Білім диагностикасы':'Диагностика знаний'} — ${grade} ${isKz?'Сынып':'Класс'}</div>

        ${isKz?'Оқушы':'Ученик'}: ${escapeHtml(nm)} &nbsp;&nbsp; ${isKz?'Күні':'Дата'}: ${dateStr}

    </div>

      </div>
    </div>`;

  html2canvas(cap,{scale:2,useCORS:true,backgroundColor:'#ffffff'}).then(canvas=>{
    const imgData=canvas.toDataURL('image/jpeg',0.95);
    const{jsPDF}=window.jspdf;
    if(!jsPDF){throw new Error('jsPDF not loaded');}
    const pdf=new jsPDF('p','mm','a4');
    const pageW=pdf.internal.pageSize.getWidth();
    const pageH=pdf.internal.pageSize.getHeight();
    const imgW=pageW;
    const imgH=canvas.height*imgW/canvas.width;
    if(imgH<=pageH){
      pdf.addImage(imgData,'JPEG',0,0,imgW,imgH);
    } else {
      let remainH=canvas.height;let srcY=0;
      const sliceH=Math.floor(canvas.width*pageH/pageW);
      let page=0;
      while(remainH>0){
        if(page>0) pdf.addPage();
        const ch=Math.min(sliceH,remainH);
        const sc=document.createElement('canvas');
        sc.width=canvas.width;sc.height=ch;
        sc.getContext('2d').drawImage(canvas,0,srcY,canvas.width,ch,0,0,canvas.width,ch);
        pdf.addImage(sc.toDataURL('image/jpeg',0.95),'JPEG',0,0,imgW,ch*imgW/canvas.width);
        srcY+=ch;remainH-=ch;page++;
      }
    }
    const fname='Aiplus_'+grade+(isKz?'сынып':'класс')+'_'+sanitizeFname(nm)+'_'+dateStr.replace(/\./g,'-')+'.pdf';
    if(/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)){window.open(pdf.output('bloburl'),'_blank');}
    else{pdf.save(fname);}
    cap.innerHTML='';cap.style.cssText='';
  }).catch(err=>{
    console.error('PDF generation failed',err);
    cap.innerHTML='';cap.style.cssText='';
    alert(S.lang==='kz'?'PDF жасау мүмкін болмады. Қайталап көріңіз.':'Не удалось создать PDF. Попробуйте ещё раз.');
  });
  return 'generating';
}

function rDiag(a){
  if(!S.diagLangPicked) return rDiagLang(a);
  if(!S.diagName) return rDiagName(a);
  if(S.diagSubject&&S.diagQuestions&&S.diagIdx<S.diagQuestions.length) return rDiagQuiz(a);
  if(S.diagSubject&&S.diagQuestions&&S.diagIdx>=S.diagQuestions.length) return rDiagResult(a);
  if(!S.diagGrade) return rDiagGrade(a);
  // Auto-flow: start next uncompleted subject or show final screen
  const subjects=Object.keys(DIAG).filter(k=>DIAG[k].grade===S.diagGrade);
  const allDone=subjects.every(s=>S.diagProgress[s]);
  if(allDone) return rDiagAllDone(a);
  const next=subjects.find(s=>!S.diagProgress[s]);
  startDiag(next);
}

function rDiagQuiz(a){
  const qs=S.diagQuestions;const q=qs[S.diagIdx];const pct=Math.round(S.diagIdx/qs.length*100);

  const newCorrect=shuffled.findIndex(x=>x.isCorrect);

function diagAnswer(chosen,correct){
  if(S.diagAnswered)return;S.diagAnswered=true;
  window.onbeforeunload=()=>'';
  const isCorrect=chosen===correct;
  S.diagAnswers.push({idx:S.diagIdx,correct:isCorrect,block:S.diagQuestions[S.diagIdx].block});
  if(isCorrect){S.diagScore++;}
  document.querySelectorAll('.diag-opt').forEach((el,i)=>{
    if(i===correct)el.classList.add('correct');
    else if(i===chosen)el.classList.add('wrong');
    el.style.pointerEvents='none';});
  setTimeout(()=>{S.diagIdx++;S.diagAnswered=false;rDiag(app())},1500);
}
function getGapAnalysis(){
  if(!S.diagAnswers||S.diagAnswers.length===0) return [];
  const subj=S.diagSubject;
  const blocks=DIAG_BLOCKS[subj];
  if(!blocks) return [];
  // Group answers by block
  const byBlock={};
  S.diagAnswers.forEach(a=>{
    const b=a.block!=null?a.block:0;
    if(!byBlock[b])byBlock[b]={total:0,correct:0};
    byBlock[b].total++;
    if(a.correct)byBlock[b].correct++;
  });
  return blocks.map((bl,i)=>{
    const stats=byBlock[i]||{total:0,correct:0};
    const pct=stats.total>0?Math.round(stats.correct/stats.total*100):0;
    return {block:bl,correct:stats.correct,total:stats.total,pct};
  });
}

function searchOlymp(query){
  if(!query||query.trim().length<2) return [];
  const normalize=str=>str.toLowerCase().trim()
    .replace(/ё/g,'е').replace(/і/g,'и').replace(/ң/g,'н')
    .replace(/ғ/g,'г').replace(/қ/g,'к').replace(/ү/g,'у')
    .replace(/ұ/g,'у').replace(/ө/g,'о').replace(/ә/g,'а')
    .replace(/һ/g,'х').replace(/\s+/g,' ');
  const q=normalize(query);
  const parts=q.split(' ').filter(p=>p.length>0);
  // Require at least 2 words (surname + name)
  if(parts.length<2) return null;
  return OLYMP_DATA.d.filter(s=>{
    const name=normalize(s[0]);
    return parts.every(p=>name.includes(p));
  }).slice(0,10);
}

function getOlympRank(student){
  return OLYMP_DATA.d.indexOf(student)+1;
}

function submitOlympContact(name){
  const phone=document.getElementById('olympPhone');
  if(!phone||!phone.value.trim()||phone.value.trim().length<7){
    phone.style.borderColor='#dc2626';setTimeout(()=>{phone.style.borderColor='#e2e8f0';},1500);return;
  }
  const WA='77007870264';
  const msg=encodeURIComponent(`Жаңа контакт (Aicup): ${name} — ${phone.value.trim()}`);
  window.open(`https://wa.me/${WA}?text=${msg}`,'_blank');
  document.getElementById('olympContactDone').style.display='block';
  phone.disabled=true;
}

function submitNotFound(name){
  const phone=document.getElementById('notFoundPhone');
  if(!phone||phone.value.trim().length<7){
    if(phone)phone.style.borderColor='#dc2626';
    setTimeout(()=>{if(phone)phone.style.borderColor='#f59e0b';},1500);return;
  }
  const msg=encodeURIComponent(`Не в списке Aicup: ${name||'не указано'} — ${phone.value.trim()}`);
  window.open(`https://wa.me/${WA}?text=${msg}`,'_blank');
  document.getElementById('notFoundDone').style.display='block';
  phone.disabled=true;
  trackOffer('not_found',name||phone.value.trim());
}

function shareOlympResult(){
  const s=S.olympStudent;
  if(!s) return;
  const name=encodeURIComponent(s[0]);
  const url=SITE_URL+'?olymp='+name;
  if(navigator.share){
    navigator.share({title:'Aicup результат',url:url});
  } else {
    navigator.clipboard.writeText(url);
    toast(S.lang==='kz'?'Сілтеме көшірілді!':'Ссылка скопирована!');
  }
}
